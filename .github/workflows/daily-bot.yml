name: ATS Daily Dev
on:
  schedule:
    - cron: '0 9 * * *' # S'exécute tous les jours à 9h00 du matin
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Autorise le bot à pousser du code

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install google-genai

      - name: Lancer le Chef de Projet
        env:
          API_KEY: ${{ secrets.IA_API_KEY }} # Clé API sécurisée
        run: python orchestrateur.py