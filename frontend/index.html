<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS AI Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <main class="container mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-blue-600 mb-4">ATS AI Matcher</h1>
            <p class="text-lg text-gray-600">Optimisez votre processus de recrutement grâce à l'intelligence artificielle pour matcher les candidats avec les offres d'emploi idéales.</p>
        </header>

        <section class="max-w-6xl mx-auto">
            <form id="uploadForm" class="space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Zone de gauche : Upload CV -->
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 transition-all hover:shadow-md">
                        <label class="block text-xl font-semibold text-gray-800 mb-4">
                            <i class="fa-solid fa-file-pdf mr-2 text-blue-600"></i>CV du Candidat
                        </label>
                        <div class="relative group">
                            <label for="cvFile" class="flex flex-col items-center justify-center w-full h-80 border-2 border-blue-200 border-dashed rounded-xl cursor-pointer bg-blue-50/50 group-hover:bg-blue-50 group-hover:border-blue-400 transition-all">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <div class="bg-blue-600 text-white p-4 rounded-full mb-4 shadow-lg group-hover:scale-110 transition-transform">
                                        <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                                    </div>
                                    <p class="mb-2 text-lg text-gray-700 font-medium">Sélectionnez le fichier PDF</p>
                                    <p class="text-sm text-gray-500 italic">ou glissez-déposez-le ici</p>
                                </div>
                                <input type="file" id="cvFile" name="cv" accept=".pdf" class="hidden" required />
                            </label>
                        </div>
                        <div id="fileStatus" class="mt-4 hidden italic text-blue-600 flex items-center gap-2">
                            <i class="fa-solid fa-check-circle"></i>
                            <span id="fileNameDisplay">CV-Selectionne.pdf</span>
                        </div>
                    </div>

                    <!-- Zone de droite : Description du poste -->
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 flex flex-col transition-all hover:shadow-md">
                        <label for="jobDescription" class="block text-xl font-semibold text-gray-800 mb-4">
                            <i class="fa-solid fa-briefcase mr-2 text-blue-600"></i>Offre d'emploi
                        </label>
                        <textarea id="jobDescription" name="description" 
                            class="flex-grow w-full p-4 text-gray-700 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none min-h-[320px]" 
                            placeholder="Collez ici l'intégralité de la fiche de poste pour permettre l'analyse comparative..." required></textarea>
                    </div>
                </div>

                <!-- Bouton d'action principal -->
                <div class="flex justify-center pt-6">
                    <button type="submit" class="group relative inline-flex items-center justify-center px-10 py-5 text-xl font-black text-white bg-blue-600 rounded-2xl hover:bg-blue-700 transition-all duration-300 transform hover:-translate-y-1 shadow-xl hover:shadow-2xl active:scale-95 overflow-hidden">
                        <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-blue-400 to-blue-700 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <span class="relative flex items-center gap-3">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                            Analyser la candidature
                        </span>
                    </button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
