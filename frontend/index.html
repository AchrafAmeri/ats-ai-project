Voici les modifications pour intégrer la zone de "Drag and Drop" et le style associé dans votre fichier `frontend/index.html`.

<<<SEARCH
    <main>
<<<REPLACE
    <main>
        <!-- Zone de Drag & Drop -->
        <div id="drop-zone" class="border-4 border-dashed border-gray-300 rounded-3xl p-12 text-center transition-all duration-300 hover:border-blue-500 hover:bg-blue-50 cursor-pointer">
            <input type="file" id="file-upload" class="hidden" accept=".pdf">
            <label for="file-upload" class="cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-up text-5xl text-blue-600 mb-4"></i>
                <h2 class="text-xl font-bold text-gray-700">Glissez votre CV ici ou cliquez pour parcourir</h2>
                <p class="text-gray-400 mt-2">Format supporté : PDF uniquement</p>
            </label>
        </div>

        <script>
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-upload');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                });
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('border-blue-600', 'bg-blue-50'));
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('border-blue-600', 'bg-blue-50'));
            });

            dropZone.addEventListener('drop', (e) => {
                fileInput.files = e.dataTransfer.files;
                // Déclencher le traitement ici si nécessaire
            });
        </script>
<<<END
